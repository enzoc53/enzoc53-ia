<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="enzoc53 IA">
<meta name="theme-color" content="#0f1117">
<title>enzoc53 IA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:rgba(255,255,255,0.08);--text:#e8eaf0;--muted:#7c8099;
  --accent:#6c8fff;--accent2:#4f6de0;--danger:#ef4444;
  --radius:14px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s;padding-top:var(--safe-top)}
#sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6c8fff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.app-title{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.app-sub{font-size:10px;color:var(--muted)}
#new-chat-btn{margin:12px;padding:10px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
#new-chat-btn:hover{background:var(--accent2)}
#conversations{flex:1;overflow-y:auto;padding:8px}
#conversations::-webkit-scrollbar{width:3px}
#conversations::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.conv-group-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:8px 8px 4px}
.conv-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--muted);transition:background 0.15s,color 0.15s;display:flex;align-items:center;gap:8px;position:relative;margin-bottom:2px}
.conv-item:hover{background:var(--bg3);color:var(--text)}
.conv-item.active{background:var(--bg3);color:var(--text)}
.conv-item .conv-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .conv-del{opacity:0;font-size:14px;color:var(--muted);transition:opacity 0.2s;flex-shrink:0;padding:2px;border:none;background:transparent;cursor:pointer;color:var(--danger)}
.conv-item:hover .conv-del{opacity:1}
#sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.status-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;transition:background 0.3s;flex-shrink:0}
.status-dot.online{background:#22c55e}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:10px;padding:12px 16px calc(12px + var(--safe-top));border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#menu-btn{background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;display:none}
#topbar select{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:7px 10px;outline:none;cursor:pointer;max-width:280px}
#topbar select:focus{border-color:var(--accent)}
.web-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
.web-toggle input{display:none}
.toggle-track{width:32px;height:18px;background:var(--bg3);border-radius:9px;position:relative;transition:background 0.2s;border:1px solid var(--border)}
.toggle-track::after{content:'';position:absolute;width:12px;height:12px;background:var(--muted);border-radius:50%;top:2px;left:2px;transition:transform 0.2s,background 0.2s}
.web-toggle input:checked+.toggle-track{background:var(--accent);border-color:var(--accent)}
.web-toggle input:checked+.toggle-track::after{transform:translateX(14px);background:#fff}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:13px;padding:6px 10px;cursor:pointer;transition:color 0.2s}
.btn-icon:hover{color:var(--text)}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:40px}
.empty-state .icon{font-size:48px;opacity:0.25}
.empty-state h2{font-size:18px;font-weight:600;color:var(--text);opacity:0.4}
.empty-state p{font-size:13px;line-height:1.6;max-width:260px}
.msg-row{display:flex;gap:8px;max-width:100%}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse;max-width:82%}
.msg-row.assistant{align-self:flex-start;max-width:88%}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.avatar.user{background:var(--accent);color:#fff}
.avatar.ai{background:linear-gradient(135deg,#6c8fff,#a78bfa);color:#fff;font-size:14px}
.bubble{padding:11px 15px;border-radius:var(--radius);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg-row.user .bubble{background:var(--accent);color:#fff;border-radius:var(--radius) 4px var(--radius) var(--radius)}
.msg-row.assistant .bubble{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:4px var(--radius) var(--radius) var(--radius)}
.sources{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.source-link{font-size:11px;color:var(--accent);text-decoration:none;opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-link:hover{opacity:1}
.search-indicator{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;padding:4px 0}
.typing-dots{display:flex;gap:4px;align-items:center;padding:3px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* INPUT */
.input-area{padding:12px 20px calc(12px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.input-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;transition:border-color 0.2s}
.input-wrap:focus-within{border-color:rgba(108,143,255,0.5)}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-family:inherit;line-height:1.5;resize:none;max-height:120px;min-height:24px}
textarea::placeholder{color:var(--muted)}
.send-btn{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s,transform 0.1s;font-size:17px}
.send-btn:hover{background:var(--accent2)}
.send-btn:active{transform:scale(0.92)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed}

/* MOBILE */
@media(max-width:640px){
  #sidebar{position:fixed;top:0;left:0;height:100%;z-index:100;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #menu-btn{display:block}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
  #overlay.show{display:block}
  #messages{padding:16px 14px}
  .input-area{padding:10px 14px calc(10px + var(--safe-bottom))}
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">🤖</div>
    <div>
      <div class="app-title">enzoc53 IA</div>
      <div class="app-sub">Assistant local privé</div>
    </div>
  </div>
  <button id="new-chat-btn" onclick="newChat()">✏️ Nouvelle discussion</button>
  <div id="conversations"></div>
  <div id="sidebar-footer">
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connexion...</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <select id="model-select"><option value="">Chargement...</option></select>
    <label class="web-toggle" title="Recherche web SearXNG">
      <input type="checkbox" id="web-toggle">
      <div class="toggle-track"></div>
      🌐
    </label>
    <button class="btn-icon" onclick="clearCurrentChat()" title="Effacer">🗑</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">🤖</div>
      <h2>enzoc53 IA</h2>
      <p>Nouvelle discussion. Active 🌐 pour la recherche web.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Envoie un message…" disabled></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>↑</button>
    </div>
  </div>
</div>

<script>
const API = 'https://gentle-bird-a0c3.enzo53cail.workers.dev';
const SYSTEM_PROMPT = `Tu es enzoc53 IA, un assistant IA local créé et hébergé par enzoc53. Tu es concis et direct.
Règles importantes :
- Réponds TOUJOURS en 2-3 phrases maximum, sauf si on te demande plus ou si c'est du code
- Pour du code, fournis le code complet sans limite de longueur
- Si l'utilisateur demande "explique en détail" ou "donne plus d'infos", alors développe
- Quand des résultats web sont fournis, utilise-les pour répondre avec des infos à jour
- Tu as été créé par enzoc53, tu n'es pas ChatGPT ni Claude`;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const modelSelect = document.getElementById('model-select');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const emptyState = document.getElementById('empty-state');
const webToggle = document.getElementById('web-toggle');
const convsEl = document.getElementById('conversations');

let conversations = JSON.parse(localStorage.getItem('enzoc53_convs') || '{}');
let currentId = null;
let isLoading = false;

function saveConvs() { localStorage.setItem('enzoc53_convs', JSON.stringify(conversations)); }

function newChat() {
  const id = 'conv_' + Date.now();
  conversations[id] = { title: 'Nouvelle discussion', messages: [], created: Date.now() };
  saveConvs();
  loadChat(id);
  renderConvList();
  closeSidebar();
}

function loadChat(id) {
  currentId = id;
  messagesEl.innerHTML = '';
  const conv = conversations[id];
  if (!conv || conv.messages.length === 0) {
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
  } else {
    emptyState.style.display = 'none';
    conv.messages.forEach(m => renderMessage(m.role, m.content, m.sources));
  }
  renderConvList();
}

function deleteChat(id, e) {
  e.stopPropagation();
  delete conversations[id];
  saveConvs();
  if (currentId === id) {
    const ids = Object.keys(conversations);
    if (ids.length > 0) loadChat(ids[ids.length-1]);
    else newChat();
  }
  renderConvList();
}

function groupConvs() {
  const now = Date.now();
  const day = 86400000;
  const groups = { "Aujourd'hui": [], "Hier": [], "7 derniers jours": [], "Plus ancien": [] };
  Object.entries(conversations).sort((a,b) => b[1].created - a[1].created).forEach(([id, c]) => {
    const age = now - c.created;
    if (age < day) groups["Aujourd'hui"].push([id, c]);
    else if (age < 2*day) groups["Hier"].push([id, c]);
    else if (age < 7*day) groups["7 derniers jours"].push([id, c]);
    else groups["Plus ancien"].push([id, c]);
  });
  return groups;
}

function renderConvList() {
  convsEl.innerHTML = '';
  const groups = groupConvs();
  Object.entries(groups).forEach(([label, items]) => {
    if (items.length === 0) return;
    const lbl = document.createElement('div');
    lbl.className = 'conv-group-label';
    lbl.textContent = label;
    convsEl.appendChild(lbl);
    items.forEach(([id, c]) => {
      const el = document.createElement('div');
      el.className = 'conv-item' + (id === currentId ? ' active' : '');
      el.onclick = () => { loadChat(id); closeSidebar(); };
      el.innerHTML = `<span class="conv-title">💬 ${c.title}</span><button class="conv-del" onclick="deleteChat('${id}', event)">✕</button>`;
      convsEl.appendChild(el);
    });
  });
}

function renderMessage(role, content, sources) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user' : 'ai');
  av.textContent = role === 'user' ? 'Tu' : '🤖';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = content;
  if (sources && sources.length > 0) {
    const src = document.createElement('div');
    src.className = 'sources';
    sources.slice(0,3).forEach(s => {
      const a = document.createElement('a');
      a.className = 'source-link';
      a.href = s.url; a.target = '_blank';
      a.textContent = '🔗 ' + (s.title || s.url).substring(0, 60);
      src.appendChild(a);
    });
    bub.appendChild(src);
  }
  row.appendChild(av); row.appendChild(bub);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(label) {
  if (emptyState) emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row assistant'; row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = '🤖';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = label
    ? `<div class="search-indicator">🔍 ${label}</div>`
    : '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(bub);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

async function loadModels() {
  statusText.textContent = 'Connexion…';
  statusDot.className = 'status-dot';
  try {
    const r = await fetch(API + '/v1/models');
    const data = await r.json();
    const models = (data.data||[]).filter(m => !m.id.includes('.save'));
    modelSelect.innerHTML = '<option value="">— sélectionner —</option>';
    models.forEach(m => {
      const o = document.createElement('option');
      o.value = m.id; o.textContent = m.id;
      modelSelect.appendChild(o);
    });
    statusDot.classList.add('online');
    statusText.textContent = models.length + ' modèle' + (models.length>1?'s':'');
  } catch {
    modelSelect.innerHTML = '<option value="">Erreur connexion</option>';
    statusText.textContent = 'Déconnecté';
  }
}

modelSelect.addEventListener('change', () => {
  const ready = !!modelSelect.value;
  inputEl.disabled = !ready;
  sendBtn.disabled = !ready;
  if (ready) inputEl.focus();
});

async function searchWeb(q) {
  try {
    const r = await fetch(API + '/search?q=' + encodeURIComponent(q));
    return (await r.json()).results?.slice(0,4) || [];
  } catch { return []; }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  const model = modelSelect.value;
  if (!text || !model || isLoading || !currentId) return;
  isLoading = true;
  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true; inputEl.disabled = true;
  if (emptyState) emptyState.style.display = 'none';

  const conv = conversations[currentId];
  conv.messages.push({ role: 'user', content: text });
  if (conv.title === 'Nouvelle discussion' && conv.messages.length === 1) {
    conv.title = text.substring(0, 40) + (text.length > 40 ? '…' : '');
    renderConvList();
  }
  renderMessage('user', text);

  let searchResults = [];
  let contextText = text;

  if (webToggle.checked) {
    showTyping('Recherche : ' + text.substring(0, 30));
    searchResults = await searchWeb(text);
    removeTyping();
    if (searchResults.length > 0) {
      const snippets = searchResults.map((r,i) => `[${i+1}] ${r.title}\n${r.content||''}`).join('\n\n');
      contextText = `Question: ${text}\n\nRésultats web:\n${snippets}\n\nRéponds en 2-3 phrases max basé sur ces résultats.`;
    }
  }

  showTyping();
  const messages = [{ role: 'system', content: SYSTEM_PROMPT }];
  conv.messages.slice(0, -1).slice(-6).forEach(m => messages.push({ role: m.role, content: m.content }));
  messages.push({ role: 'user', content: contextText });

  try {
    const r = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages, stream: false, temperature: 0.7 })
    });
    const data = await r.json();
    removeTyping();
    const reply = data.choices?.[0]?.message?.content || '(pas de réponse)';
    conv.messages.push({ role: 'assistant', content: reply, sources: searchResults });
    saveConvs();
    renderMessage('assistant', reply, searchResults);
  } catch {
    removeTyping();
    renderMessage('assistant', '⚠️ Erreur de connexion.');
    conv.messages.pop();
  }
  isLoading = false;
  sendBtn.disabled = false; inputEl.disabled = false; inputEl.focus();
}

function clearCurrentChat() {
  if (!currentId) return;
  conversations[currentId].messages = [];
  conversations[currentId].title = 'Nouvelle discussion';
  saveConvs();
  loadChat(currentId);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Init
loadModels();
const ids = Object.keys(conversations);
if (ids.length > 0) loadChat(ids[ids.length-1]);
else newChat();
</script>
</body>
</html>
