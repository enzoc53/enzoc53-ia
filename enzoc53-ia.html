<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="enzoc53 IA">
<meta name="theme-color" content="#0f1117">
<title>enzoc53 IA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
    --border: rgba(255,255,255,0.08); --text: #e8eaf0; --muted: #7c8099;
    --accent: #6c8fff; --accent2: #4f6de0; --radius: 14px; --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: calc(14px + var(--safe-top)) 20px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #6c8fff, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 2px 12px rgba(108,143,255,0.3); }
  .app-name { display: flex; flex-direction: column; }
  .app-name strong { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .app-name span { font-size: 11px; color: var(--muted); }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
  .status-dot.online { background: #22c55e; }
  .model-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; flex-wrap: wrap; }
  .config-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .model-bar select { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; padding: 7px 10px; outline: none; cursor: pointer; }
  .model-bar select:focus { border-color: var(--accent); }
  .btn-sm { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 13px; padding: 7px 12px; cursor: pointer; transition: color 0.2s; white-space: nowrap; }
  .btn-sm:hover { color: var(--text); }
  .btn-clear:hover { color: #ef4444; }
  .web-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
  .web-toggle input { display: none; }
  .toggle-track { width: 32px; height: 18px; background: var(--bg3); border-radius: 9px; position: relative; transition: background 0.2s; border: 1px solid var(--border); }
  .toggle-track::after { content: ''; position: absolute; width: 12px; height: 12px; background: var(--muted); border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
  .web-toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .web-toggle input:checked + .toggle-track::after { transform: translateX(14px); background: #fff; }
  #messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); text-align: center; padding: 40px; }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); opacity: 0.5; }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 260px; }
  .msg-row { display: flex; gap: 8px; max-width: 100%; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; max-width: 85%; }
  .msg-row.assistant { align-self: flex-start; max-width: 92%; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .avatar.user { background: var(--accent); color: #fff; font-size: 11px; }
  .avatar.ai { background: linear-gradient(135deg, #6c8fff, #a78bfa); color: #fff; }
  .bubble { padding: 11px 15px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .msg-row.user .bubble { background: var(--accent); color: #fff; border-radius: var(--radius) 4px var(--radius) var(--radius); }
  .msg-row.assistant .bubble { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 4px var(--radius) var(--radius) var(--radius); }
  .search-indicator { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; padding: 6px 0 2px; }
  .search-indicator::before { content: '🔍'; font-size: 11px; }
  .sources { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .source-link { font-size: 11px; color: var(--accent); text-decoration: none; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-link:hover { opacity: 1; }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }
  .input-area { padding: 12px 16px calc(12px + var(--safe-bottom)); border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .sys-toggle { background: transparent; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 0 0 8px; display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
  .sys-toggle:hover { color: var(--text); }
  #sys-prompt-area { display: none; margin-bottom: 10px; }
  #sys-prompt-area.open { display: block; }
  #sys-prompt { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-family: inherit; padding: 8px 12px; resize: vertical; min-height: 56px; outline: none; }
  .input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.2s; }
  .input-wrap:focus-within { border-color: rgba(108,143,255,0.5); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.5; resize: none; max-height: 120px; min-height: 24px; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s; font-size: 17px; }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">🤖</div>
    <div class="app-name">
      <strong>enzoc53 IA</strong>
      <span>Assistant local privé</span>
    </div>
  </div>
  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connexion...</span>
  </div>
</header>

<div class="model-bar">
  <span class="config-label">Modèle</span>
  <select id="model-select"><option value="">Chargement...</option></select>
  <button class="btn-sm" onclick="loadModels()">⟳</button>
  <label class="web-toggle" title="Recherche web avec SearXNG">
    <input type="checkbox" id="web-search-toggle">
    <div class="toggle-track"></div>
    🌐 Web
  </label>
  <button class="btn-sm btn-clear" onclick="clearChat()">🗑</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="icon">🤖</div>
    <h2>enzoc53 IA</h2>
    <p>Ton assistant IA local. Active 🌐 Web pour la recherche internet en temps réel.</p>
  </div>
</div>

<div class="input-area">
  <button class="sys-toggle" onclick="toggleSys()">
    <span id="sys-arrow">▶</span> Prompt système
  </button>
  <div id="sys-prompt-area">
    <textarea id="sys-prompt" rows="2">Tu es un assistant IA utile et concis nommé enzoc53 IA. Réponds toujours en français. Quand des résultats de recherche web te sont fournis, utilise-les pour donner une réponse précise et à jour.</textarea>
  </div>
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Envoie un message…" disabled></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>↑</button>
  </div>
</div>

<script>
const API = 'https://gentle-bird-a0c3.enzo53cail.workers.dev';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const modelSelect = document.getElementById('model-select');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const emptyState = document.getElementById('empty-state');
const webToggle = document.getElementById('web-search-toggle');
let history = [];
let currentModel = '';
let isLoading = false;

function getSys() { return document.getElementById('sys-prompt').value.trim(); }
function toggleSys() {
  const a = document.getElementById('sys-prompt-area');
  const ar = document.getElementById('sys-arrow');
  a.classList.toggle('open');
  ar.textContent = a.classList.contains('open') ? '▼' : '▶';
}

async function loadModels() {
  statusText.textContent = 'Connexion…';
  statusDot.className = 'status-dot';
  modelSelect.innerHTML = '<option value="">Chargement…</option>';
  try {
    const r = await fetch(API + '/v1/models');
    const data = await r.json();
    const models = (data.data || []).filter(m => !m.id.includes('.save'));
    modelSelect.innerHTML = '<option value="">— sélectionner —</option>';
    models.forEach(m => {
      const o = document.createElement('option');
      o.value = m.id; o.textContent = m.id;
      modelSelect.appendChild(o);
    });
    statusDot.classList.add('online');
    statusText.textContent = models.length + ' modèle' + (models.length > 1 ? 's' : '');
  } catch(e) {
    modelSelect.innerHTML = '<option value="">Erreur connexion</option>';
    statusText.textContent = 'Déconnecté';
  }
}

modelSelect.addEventListener('change', () => {
  currentModel = modelSelect.value;
  inputEl.disabled = !currentModel;
  sendBtn.disabled = !currentModel;
  if (currentModel) inputEl.focus();
});

async function searchWeb(query) {
  try {
    const r = await fetch(API + '/search?q=' + encodeURIComponent(query));
    const data = await r.json();
    const results = (data.results || []).slice(0, 4);
    return results;
  } catch(e) {
    return [];
  }
}

function addMessage(role, content, sources) {
  if (emptyState) emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user' : 'ai');
  av.textContent = role === 'user' ? 'Tu' : '🤖';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = content;
  if (sources && sources.length > 0) {
    const src = document.createElement('div');
    src.className = 'sources';
    sources.forEach(s => {
      const a = document.createElement('a');
      a.className = 'source-link';
      a.href = s.url;
      a.target = '_blank';
      a.textContent = '🔗 ' + (s.title || s.url);
      src.appendChild(a);
    });
    bub.appendChild(src);
  }
  row.appendChild(av); row.appendChild(bub);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(label) {
  if (emptyState) emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row assistant'; row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = '🤖';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  if (label) {
    const ind = document.createElement('div');
    ind.className = 'search-indicator';
    ind.textContent = label;
    bub.appendChild(ind);
  } else {
    bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  }
  row.appendChild(av); row.appendChild(bub);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !currentModel || isLoading) return;
  isLoading = true;
  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true; inputEl.disabled = true;
  history.push({ role: 'user', content: text });
  addMessage('user', text);

  let searchResults = [];
  let contextText = text;

  if (webToggle.checked) {
    showTyping('Recherche en cours : ' + text);
    searchResults = await searchWeb(text);
    removeTyping();
    if (searchResults.length > 0) {
      const snippets = searchResults.map((r, i) => `[${i+1}] ${r.title}\n${r.content || r.url}`).join('\n\n');
      contextText = `Question: ${text}\n\nRésultats de recherche web:\n${snippets}\n\nRéponds à la question en te basant sur ces résultats.`;
    }
  }

  showTyping();
  const messages = [];
  const sys = getSys();
  if (sys) messages.push({ role: 'system', content: sys });
  const histCopy = [...history];
  histCopy[histCopy.length - 1] = { role: 'user', content: contextText };
  messages.push(...histCopy);

  try {
    const r = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: currentModel, messages, stream: false, temperature: 0.7 })
    });
    const data = await r.json();
    removeTyping();
    const reply = data.choices?.[0]?.message?.content || '(pas de réponse)';
    history.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply, webToggle.checked ? searchResults : []);
  } catch(e) {
    removeTyping();
    addMessage('assistant', '⚠️ Erreur de connexion.');
    history.pop();
  }
  isLoading = false;
  sendBtn.disabled = false; inputEl.disabled = false; inputEl.focus();
}

function clearChat() {
  history = [];
  messagesEl.querySelectorAll('.msg-row').forEach(r => r.remove());
  if (emptyState) emptyState.style.display = '';
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

loadModels();
</script>
</body>
</html>
